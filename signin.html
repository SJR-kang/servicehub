<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServiceHub | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-page {
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fb 0%, #e4e8f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }
    .auth-container {
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }
    .auth-card {
      background: white;
      border-radius: 32px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo {
      display: inline-block;
      font-size: 28px;
      font-weight: 800;
      color: #1a2c3e;
      text-decoration: none;
      margin-bottom: 20px;
    }
    .auth-logo i {
      margin-right: 8px;
    }
    .auth-header h2 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #1a2c3e;
    }
    .auth-header p {
      color: #5f7f90;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #1a2c3e;
    }
    .input-group label i {
      margin-right: 8px;
      color: #5f7f90;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2edf2;
      border-radius: 16px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: 0.2s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #1a2c3e;
    }
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #5f7f90;
    }
    .forgot-link {
      color: #1a2c3e;
      text-decoration: none;
      font-size: 14px;
    }
    .auth-submit-btn {
      width: 100%;
      background: #1a2c3e;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .auth-submit-btn:hover {
      background: #2c4a6e;
      transform: translateY(-2px);
    }
    .auth-submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .demo-accounts {
      margin-top: 16px;
      border-top: 1px solid #eef2f6;
      padding-top: 16px;
    }
    .demo-accounts p {
      font-size: 12px;
      color: #5f7f90;
      margin-bottom: 8px;
    }
    .demo-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .demo-btn {
      flex: 1;
      background: #f0f4f8;
      border: none;
      padding: 8px 12px;
      border-radius: 40px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .demo-btn:hover {
      background: #e2edf2;
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #eef2f6;
      color: #5f7f90;
    }
    .auth-footer a {
      color: #1a2c3e;
      text-decoration: none;
      font-weight: 600;
    }
    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a2c3e;
      color: white;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 500;
      z-index: 2000;
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
      display: none;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <i class="fas fa-handshake"></i> ServiceHub
        </a>
        <h2>Welcome Back</h2>
        <p>Login to access your dashboard</p>
      </div>
      
      <form id="loginFormElement" class="auth-form-container">
        <div class="input-group">
          <label><i class="fas fa-envelope"></i> Email Address</label>
          <input type="email" id="loginEmail" placeholder="seeker@example.com" required autocomplete="email">
        </div>
        
        <div class="input-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="loginPassword" placeholder="••••••" required autocomplete="current-password">
        </div>
        
        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe"> Remember me
          </label>
          <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot password?</a>
        </div>
        
        <button type="submit" class="auth-submit-btn" id="loginSubmitBtn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
        
        <div class="demo-accounts">
          <p><i class="fas fa-info-circle"></i> Demo Accounts:</p>
          <div class="demo-buttons">
            <button type="button" class="demo-btn" id="seekerDemoBtn">
              <i class="fas fa-user"></i> Seeker Demo
            </button>
            <button type="button" class="demo-btn" id="providerDemoBtn">
              <i class="fas fa-briefcase"></i> Provider Demo
            </button>
          </div>
        </div>
      </form>
      
      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create one now</a>
      </div>
    </div>
  </div>
  
  <div id="toastMsg" class="toast-message"></div>

  <script src="database.js"></script>
  <script src="api.js"></script>
  <script>
    const toastMsg = document.getElementById('toastMsg');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const submitBtn = document.getElementById('loginSubmitBtn');
    
    function showToast(message, type) {
      toastMsg.innerText = message;
      toastMsg.style.backgroundColor = type === 'success' ? '#10b981' : '#dc2626';
      toastMsg.style.display = 'block';
      setTimeout(() => { toastMsg.style.display = 'none'; }, 3000);
    }
    
    function setLoading(isLoading) {
      if (isLoading) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Signing In...';
      } else {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      }
    }
    
    function redirectToDashboard(user) {
      console.log('🔄 Redirecting user:', user);
      
      // Store user in localStorage
      localStorage.setItem('servicehub_user', JSON.stringify({
        id: user.id,
        name: user.name,
        email: user.email,
        userType: user.userType || user.type,
        type: user.type || user.userType
      }));
      
      // Redirect based on user type
      if (user.userType === 'provider' || user.type === 'provider') {
        console.log('🚀 Redirecting to provider_dashboard.html');
        window.location.href = 'provider_dashboard.html';
      } else {
        console.log('🚀 Redirecting to 1seeker_dashboard.html');
        window.location.href = '1seeker_dashboard.html';
      }
    }
    
    async function handleLogin(email, password) {
      console.log('🔐 Attempting login for:', email);
      
      if (!email || !password) {
        showToast('❌ Please enter email and password', 'error');
        return false;
      }
      
      // Wait for database to be ready
      if (!window.ServiceHubDB) {
        await new Promise(resolve => {
          const checkDB = setInterval(() => {
            if (window.ServiceHubDB) {
              clearInterval(checkDB);
              resolve();
            }
          }, 100);
        });
      }
      
      try {
        const result = await ServiceHubAPI.signin({ email, password });
        const user = {
          id: result.user.id,
          name: result.user.name,
          email: result.user.email,
          userType: result.user.role === 'PROVIDER' ? 'provider' : 'seeker',
          type: result.user.role === 'PROVIDER' ? 'provider' : 'seeker'
        };
        ServiceHubAPI.setToken(result.token);
        console.log('✅ Login successful! User:', user.name, 'Type:', user.userType || user.type);
        showToast(`🎉 Welcome back, ${user.name}! Redirecting...`, 'success');
        
        setTimeout(() => {
          redirectToDashboard(user);
        }, 500);
        
        return true;
      } catch (apiErr) {
        // Fallback to localStorage database for local demo usage.
        const user = ServiceHubDB.authenticateUser(email, password);
        if (user) {
          console.log('✅ Local fallback login successful! User:', user.name);
          showToast(`🎉 Welcome back, ${user.name}! Redirecting...`, 'success');
          setTimeout(() => redirectToDashboard(user), 500);
          return true;
        }
        console.log('❌ Login failed for:', email);
        showToast(`❌ ${apiErr.message || 'Invalid email or password'}`, 'error');
        return false;
      }
    }
    
    // Form submit handler
    const loginForm = document.getElementById('loginFormElement');
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = loginEmail.value.trim();
      const password = loginPassword.value;
      const rememberMe = document.getElementById('rememberMe').checked;
      
      setLoading(true);
      await handleLogin(email, password);
      setLoading(false);
      
      if (rememberMe) {
        localStorage.setItem('remembered_email', email);
      } else {
        localStorage.removeItem('remembered_email');
      }
    });
    
    // Seeker Demo Button
    const seekerDemoBtn = document.getElementById('seekerDemoBtn');
    seekerDemoBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      console.log('🎯 Seeker Demo button clicked');
      
      const email = 'seeker@example.com';
      const password = 'demo123';
      
      loginEmail.value = email;
      loginPassword.value = password;
      
      setLoading(true);
      await handleLogin(email, password);
      setLoading(false);
    });
    
    // Provider Demo Button
    const providerDemoBtn = document.getElementById('providerDemoBtn');
    providerDemoBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      console.log('🎯 Provider Demo button clicked');
      
      const email = 'provider@example.com';
      const password = 'demo123';
      
      loginEmail.value = email;
      loginPassword.value = password;
      
      setLoading(true);
      await handleLogin(email, password);
      setLoading(false);
    });
    
    // Forgot password handler
    const forgotPasswordLink = document.getElementById('forgotPasswordLink');
    forgotPasswordLink.addEventListener('click', (e) => {
      e.preventDefault();
      showToast('📧 Please contact support@servicehub.com to reset your password', 'success');
    });
    
    // Auto-fill remembered email
    const rememberedEmail = localStorage.getItem('remembered_email');
    if (rememberedEmail) {
      loginEmail.value = rememberedEmail;
      document.getElementById('rememberMe').checked = true;
    }
    
    // Wait for database to be ready
    (async function() {
      if (!window.ServiceHubDB) {
        console.log('⏳ Waiting for database to load...');
        await new Promise(resolve => {
          const checkDB = setInterval(() => {
            if (window.ServiceHubDB) {
              clearInterval(checkDB);
              resolve();
            }
          }, 100);
        });
      }
      console.log('✅ Database ready. Signin page loaded.');
      console.log('💡 Demo Accounts:');
      console.log('   Seeker: seeker@example.com / demo123');
      console.log('   Provider: provider@example.com / demo123');
    })();
  </script>
</body>
</html>
