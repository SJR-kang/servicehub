<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServiceHub | Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-page {
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fb 0%, #e4e8f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }
    .auth-container {
      width: 100%;
      max-width: 520px;
      padding: 20px;
    }
    .auth-card {
      background: white;
      border-radius: 32px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo {
      display: inline-block;
      font-size: 28px;
      font-weight: 800;
      color: #1a2c3e;
      text-decoration: none;
      margin-bottom: 20px;
    }
    .auth-logo i {
      margin-right: 8px;
    }
    .auth-header h2 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #1a2c3e;
    }
    .auth-header p {
      color: #5f7f90;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #1a2c3e;
    }
    .input-group label i {
      margin-right: 8px;
      color: #5f7f90;
    }
    .input-group input, .input-group select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2edf2;
      border-radius: 16px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: 0.2s;
    }
    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: #1a2c3e;
    }
    .role-hint {
      font-size: 12px;
      color: #5f7f90;
      margin-top: 5px;
      display: block;
    }
    .terms-check {
      margin-bottom: 24px;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #5f7f90;
      font-size: 14px;
    }
    .checkbox-label a {
      color: #1a2c3e;
      text-decoration: none;
      font-weight: 500;
    }
    .auth-submit-btn {
      width: 100%;
      background: #1a2c3e;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .auth-submit-btn:hover {
      background: #2c4a6e;
      transform: translateY(-2px);
    }
    .auth-submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #eef2f6;
      color: #5f7f90;
    }
    .auth-footer a {
      color: #1a2c3e;
      text-decoration: none;
      font-weight: 600;
    }
    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a2c3e;
      color: white;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 500;
      z-index: 2000;
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
      display: none;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <i class="fas fa-handshake"></i> ServiceHub
        </a>
        <h2>Create Account</h2>
        <p>Join our community of seekers and providers</p>
      </div>
      
      <form id="registerFormElement" class="auth-form-container">
        <div class="input-group">
          <label><i class="fas fa-user"></i> Full Name</label>
          <input type="text" id="regFullName" placeholder="John Doe" required autocomplete="name">
        </div>
        
        <div class="input-group">
          <label><i class="fas fa-envelope"></i> Email Address</label>
          <input type="email" id="regEmail" placeholder="name@example.com" required autocomplete="email">
        </div>
        
        <div class="input-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="regPassword" placeholder="Create a strong password (min. 4 characters)" required autocomplete="new-password">
        </div>
        
        <div class="input-group">
          <label><i class="fas fa-lock"></i> Confirm Password</label>
          <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required autocomplete="new-password">
        </div>
        
        <div class="input-group">
          <label><i class="fas fa-briefcase"></i> I am a</label>
          <select id="regUserType">
            <option value="seeker">Service Seeker</option>
            <option value="provider">Service Provider</option>
          </select>
          <small class="role-hint" id="roleHint">Find and request services from professionals</small>
        </div>
        
        <div class="input-group">
          <label><i class="fas fa-phone"></i> Phone Number (Optional)</label>
          <input type="tel" id="regPhone" placeholder="+1 (555) 000-0000">
        </div>
        
        <div class="terms-check">
          <label class="checkbox-label">
            <input type="checkbox" id="agreeTerms" required> I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
          </label>
        </div>
        
        <button type="submit" class="auth-submit-btn" id="registerSubmitBtn">
          <i class="fas fa-user-plus"></i> Sign Up
        </button>
      </form>
      
      <div class="auth-footer">
        Already have an account? <a href="signin.html">Sign In</a>
      </div>
    </div>
  </div>
  
  <div id="toastMsg" class="toast-message"></div>
  
  <script src="database.js"></script>
  <script src="api.js"></script>
  <script>
    const registerForm = document.getElementById('registerFormElement');
    const toastMsg = document.getElementById('toastMsg');
    const userTypeSelect = document.getElementById('regUserType');
    const roleHint = document.getElementById('roleHint');
    const submitBtn = document.getElementById('registerSubmitBtn');
    
    // Update hint based on selected role
    userTypeSelect.addEventListener('change', () => {
      const type = userTypeSelect.value;
      if (type === 'seeker') {
        roleHint.textContent = 'Find and request services from professionals';
      } else {
        roleHint.textContent = 'Offer your services, manage client requests, and grow your business';
      }
    });
    
    function showToast(message, type) {
      toastMsg.innerText = message;
      toastMsg.style.backgroundColor = type === 'success' ? '#10b981' : '#dc2626';
      toastMsg.style.display = 'block';
      setTimeout(() => { toastMsg.style.display = 'none'; }, 3000);
    }
    
    // Register new user using ServiceHubDB
    async function registerUser(name, email, password, userType, phone) {
      // Wait for database to be ready
      if (!window.ServiceHubDB) {
        await new Promise(resolve => {
          const checkDB = setInterval(() => {
            if (window.ServiceHubDB) {
              clearInterval(checkDB);
              resolve();
            }
          }, 100);
        });
      }
      
      try {
        const result = await ServiceHubAPI.signup({
          name,
          email,
          password,
          role: userType === 'provider' ? 'PROVIDER' : 'SEEKER',
          phone: phone || ""
        });
        ServiceHubAPI.setToken(result.token);
        console.log('✅ User registered successfully:', result.user);
        showToast(`🎉 Welcome ${name}! Registration successful. Redirecting...`, 'success');
        
        // Auto-login after registration
        localStorage.setItem('servicehub_user', JSON.stringify({
          id: result.user.id,
          name: result.user.name,
          email: result.user.email,
          userType: userType,
          type: userType
        }));
        
        // Redirect based on user type
        setTimeout(() => {
          if (userType === 'provider') {
            window.location.href = 'provider_dashboard.html';
          } else {
            window.location.href = '1seeker_dashboard.html';
          }
        }, 1500);
        return true;
      } catch (apiErr) {
        // Fallback to localStorage database for local demo usage.
        const existingUser = ServiceHubDB.getUserByEmail(email);
        if (existingUser) {
          showToast('❌ Email already registered! Please sign in instead.', 'error');
          return false;
        }
        const newUser = ServiceHubDB.registerUser({
          name: name,
          email: email,
          password: password,
          type: userType,
          phone: phone || ""
        });
        if (newUser) {
          showToast(`🎉 Welcome ${name}! Registration successful. Redirecting...`, 'success');
          localStorage.setItem('servicehub_user', JSON.stringify({
            name: name,
            email: email,
            userType: userType,
            type: userType
          }));
          setTimeout(() => {
            window.location.href = userType === 'provider' ? 'provider_dashboard.html' : '1seeker_dashboard.html';
          }, 1500);
          return true;
        }
        showToast(`❌ ${apiErr.message || 'Registration failed'}`, 'error');
      }
      return false;
    }
    
    // Set loading state
    function setLoading(isLoading) {
      if (isLoading) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Creating Account...';
      } else {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Sign Up';
      }
    }
    
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fullName = document.getElementById('regFullName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;
      const userType = document.getElementById('regUserType').value;
      const phone = document.getElementById('regPhone').value.trim();
      const agreeTerms = document.getElementById('agreeTerms').checked;
      
      // Validation
      if (!fullName || !email || !password) {
        showToast('❌ Please fill all required fields', 'error');
        return;
      }
      
      if (password !== confirmPassword) {
        showToast('❌ Passwords do not match!', 'error');
        return;
      }
      
      if (password.length < 4) {
        showToast('❌ Password must be at least 4 characters', 'error');
        return;
      }
      
      if (!agreeTerms) {
        showToast('❌ Please agree to the Terms of Service', 'error');
        return;
      }
      
      // Email format validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showToast('❌ Please enter a valid email address', 'error');
        return;
      }
      
      // Register user
      setLoading(true);
      await registerUser(fullName, email, password, userType, phone);
      setLoading(false);
    });
    
    // Wait for database to be ready
    (async function() {
      if (!window.ServiceHubDB) {
        console.log('⏳ Waiting for database to load...');
        await new Promise(resolve => {
          const checkDB = setInterval(() => {
            if (window.ServiceHubDB) {
              clearInterval(checkDB);
              resolve();
            }
          }, 100);
        });
      }
      console.log('✅ Database ready. Signup page loaded.');
      console.log('💡 Demo accounts available for sign in:');
      console.log('   Seeker: seeker@example.com / demo123');
      console.log('   Provider: provider@example.com / demo123');
    })();
  </script>
</body>
</html>
